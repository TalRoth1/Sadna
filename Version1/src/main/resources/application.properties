# =====================
#  JWT session tokens
# =====================
# Secret key used to sign / verify JWTs (HS256). Must be at least 32 bytes.
# In production, override with the JWT_SECRET environment variable or an
# externalized property file — do NOT commit a real secret to git.
jwt.secret=change-me-please-this-is-a-development-only-default-secret-key-1234567890

# Token lifetime in milliseconds (default: 1 hour).
jwt.expiration-ms=3600000

# =====================
#  Profiles
# =====================
# Default to the "dev" profile so DevDataSeeder runs and the in-memory
# repos get a handful of demo events for the React Event Search page.
# Override with SPRING_PROFILES_ACTIVE=prod (or any other value) in
# production deployments.
spring.profiles.active=localdb

# ===============================
# PostgreSQL / Google Cloud SQL
# ===============================

spring.datasource.url=jdbc:postgresql://35.242.177.151:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Optional, but recommended
spring.jpa.open-in-view=false

